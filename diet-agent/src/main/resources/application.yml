# ==========================================
# 饮食推荐 Agent 主配置
# 敏感信息（数据库密码、API Key）请放入 application-dev.yml（不提交 git）
# ==========================================

spring:
  application:
    name: diet-agent
  profiles:
    active: dev

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.diet.model
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

diet:
  llm:
    main-model: qwen-max
    light-model: qwen-turbo
  session:
    max-history-turns: 10

logging:
  level:
    com.diet: INFO
